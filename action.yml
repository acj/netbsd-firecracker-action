name: NetBSD Firecracker VM
author: Adam Jensen (@acj)
description: Launch a NetBSD VM in Firecracker and run a script inside it

inputs:
  kernel-url:
    type: string
    required: false
    default: https://github.com/acj/netbsd-firecracker/releases/download/v0.1.0/netbsd-kern.bin
  rootfs-url:
    type: string
    required: false
    default: https://github.com/acj/netbsd-firecracker/releases/download/v0.1.0/netbsd-rootfs.bin.xz
  firecracker-url:
    type: string
    required: false
    default: https://github.com/acj/netbsd-firecracker/releases/download/v0.1.0/firecracker
  ssh-public-key-url:
    type: string
    required: false
    default: https://github.com/acj/netbsd-firecracker/releases/download/v0.1.0/netbsd.id_rsa.pub
  ssh-private-key-url:
    type: string
    required: false
    default: https://github.com/acj/netbsd-firecracker/releases/download/v0.1.0/netbsd.id_rsa
  pre-run:
    description: |
      An optional script to run before starting the NetBSD virtual machine. This script runs on
      the host. By default, it copies the contents of the workspace directory into the VM.
    required: false
    type: string
    default: |
      exclude_path="$(mktemp)"
      cat <<EOF > $exclude_path
      .git
      .github
      .gitignore
      .gitmodules
      LICENSE
      README.md
      README.txt
      README
      action.yml
      EOF

      rsync -r -e "ssh" \
        --relative \
        --copy-links \
        --exclude-from "$exclude_path" \
        . firecracker:
      rm -f "$exclude_path"
  run-in-vm:
    description: The script to run inside the NetBSD virtual machine
    required: true
    type: string
  post-run:
    description: |
      An optional script to run after the `run-in-vm` script exits. This script runs on the host.
      By default, it copies the contents of the VM's `/root` directory into the workspace directory.
    required: false
    type: string
    default: |
      rsync -r -e "ssh" \
        --relative \
        --copy-links \
        firecracker: .
  checkout:
    required: false
    type: boolean
    default: true
  continue-on-error:
    required: false
    type: boolean
    default: false
  verbose:
    required: false
    type: boolean
    default: false
  disk-size:
    description: |
      Size to grow the VM's disk image to, in units recognized by truncate(1)
    required: false
    type: string
    default: "2G"
  vcpu-count:
    description: Number of vCPUs to expose to the VM. Use "auto" to match the host's logical core count.
    required: false
    type: string
    default: "auto"

runs:
  using: "composite"

  steps:
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Print diagnostic info
      shell: bash
      if: inputs.verbose == 'true'
      run: |
        echo "CPU info:"
        cat /proc/cpuinfo
        echo "Memory info:"
        cat /proc/meminfo
        echo "Kernel version:"
        uname -a
        echo "Kernel command line:"
        cat /proc/cmdline
        echo "Network interfaces:"
        ip addr show

    - name: Start Firecracker VM
      shell: sudo bash -e {0}
      run: |
        kernel_path="$(mktemp)"
        wget -q -O "$kernel_path" ${{ inputs.kernel-url }}

        rootfs_path="$(mktemp)"
        wget -q -O /tmp/netbsd-rootfs.bin.xz ${{ inputs.rootfs-url }}
        xz -T 0 -d /tmp/netbsd-rootfs.bin.xz
        truncate -s ${{ inputs.disk-size }} /tmp/netbsd-rootfs.bin
        mv /tmp/netbsd-rootfs.bin "$rootfs_path"

        firecracker_path="$(mktemp)"
        wget -q -O "$firecracker_path" ${{ inputs.firecracker-url }}
        chmod +x "$firecracker_path"

        public_key_path="$(mktemp)"
        private_key_path="$(mktemp)"
        wget -q -O "$public_key_path" ${{ inputs.ssh-public-key-url }}
        wget -q -O "$private_key_path" ${{ inputs.ssh-private-key-url }}
        install -D -o $SUDO_USER -m 600 -T "$private_key_path" /etc/ssh/netbsd.id_rsa

        cat <<EOF > /etc/ssh/ssh_config.d/firecracker.conf
        Host firecracker
          Hostname 172.16.0.2
          User root
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          IdentityFile /etc/ssh/netbsd.id_rsa
        EOF

        sudo setfacl -m u:${USER}:rw /dev/kvm

        INET_DEV="eth0"
        TAP_DEV="tap0"
        TAP_IP="172.16.0.1"
        MASK_SHORT="/24"

        sudo ip link del "$TAP_DEV" 2> /dev/null || true
        sudo ip tuntap add dev "$TAP_DEV" mode tap
        sudo ip addr add "${TAP_IP}${MASK_SHORT}" dev "$TAP_DEV"
        sudo ip link set dev "$TAP_DEV" up

        sudo sh -c "echo 1 > /proc/sys/net/ipv4/ip_forward"

        sudo iptables -t nat -D POSTROUTING -o "$INET_DEV" -j MASQUERADE || true
        sudo iptables -D FORWARD -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT || true
        sudo iptables -D FORWARD -i tap0 -o "$INET_DEV" -j ACCEPT || true
        sudo iptables -t nat -A POSTROUTING -o "$INET_DEV" -j MASQUERADE
        sudo iptables -I FORWARD 1 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
        sudo iptables -I FORWARD 1 -i tap0 -o "$INET_DEV" -j ACCEPT

        API_SOCKET="/tmp/firecracker.socket"

        KERNEL="$kernel_path"
        KERNEL_BOOT_ARGS="console=com root=ld0a"

        ROOTFS="$rootfs_path"
        VCPU_COUNT="${{ inputs.vcpu-count }}"
        if [ "$VCPU_COUNT" = "auto" ]; then
          VCPU_COUNT="$(nproc 2>/dev/null || echo 1)"
        fi
        if ! [[ "$VCPU_COUNT" =~ ^[1-9][0-9]*$ ]]; then
          echo "vcpu-count must be a positive integer or auto"
          exit 1
        fi
        echo "Using $VCPU_COUNT vCPU(s)"

        # The IP address of a guest is derived from its MAC address by the
        # guest's rc.d/fcnet script. It is important that `TAP_IP` and
        # `FC_MAC` match this.
        FC_MAC="06:00:AC:10:00:02"

        cat <<EOF > vmconfig.json
        {
          "boot-source": {
            "kernel_image_path": "$KERNEL",
            "boot_args": "$KERNEL_BOOT_ARGS"
          },
          "drives": [
            {
              "drive_id": "rootfs",
              "path_on_host": "$ROOTFS",
              "is_root_device": true,
              "is_read_only": false
            }
          ],
          "network-interfaces": [
              {
                  "iface_id": "eth0",
                  "guest_mac": "$FC_MAC",
                  "host_dev_name": "$TAP_DEV"
              }
          ],
          "entropy": {},
          "machine-config": {
            "vcpu_count": $VCPU_COUNT,
            "mem_size_mib": 5120,
            "smt": false
          }
        }
        EOF

        # When disk-size grows the image, the guest's resize_root grows the filesystem on first
        # boot and reboots. Firecracker treats a guest reboot as a shutdown, so one process exit
        # during startup is expected; relaunch and keep waiting.
        resize_relaunch_budget=1

        start_firecracker() {
          if [ -e "$API_SOCKET" ]; then
            echo "Removing stale API socket from previous run"
            rm -f "$API_SOCKET"
          fi
          if [ ${{ inputs.verbose }} = true ]; then
            nohup $firecracker_path --api-sock $API_SOCKET --config-file vmconfig.json --log-path $LOGFILE &
          else
            nohup $firecracker_path --api-sock $API_SOCKET --config-file vmconfig.json --log-path $LOGFILE > /dev/null 2>&1 &
          fi
          firecracker_pid=$!
          echo "$firecracker_pid" > /tmp/firecracker.pid
        }

        LOGFILE="/tmp/firecracker.log"
        touch $LOGFILE

        vm_started=false
        for vm_start_attempt in {1..3}; do
          start_firecracker

          set +e
          for vm_connect_attempt in {1..15}; do
            if ! kill -0 "$firecracker_pid" 2>/dev/null; then
              if [ "$resize_relaunch_budget" -gt 0 ]; then
                resize_relaunch_budget=$((resize_relaunch_budget - 1))
                echo "Guest rebooted (first-boot filesystem resize); relaunching VM"
                start_firecracker
                continue
              fi
              break
            fi
            ssh firecracker true
            if [ $? -eq 0 ]; then
              vm_started=true
              break
            fi
            sleep 1
          done
          set -e

          if [ $vm_started = true ]; then
            break
          fi

          echo "Attempt $vm_start_attempt: Firecracker VM did not start, retrying..."
          kill "$firecracker_pid" 2>/dev/null || true
          wait "$firecracker_pid" 2>/dev/null || true

          echo "::group::ℹ️ Firecracker VM log (attempt $vm_start_attempt)"
          cat $LOGFILE
          echo "::endgroup::"
          rm -f $LOGFILE
          touch $LOGFILE
        done

        if [ "$vm_started" = true ]; then
          echo "✅ Firecracker VM started successfully"
        else
          echo "❌ Failed to start Firecracker VM after multiple attempts. Please report this issue and include the Firecracker VM log below."
          exit 1
        fi

        # The microVM has no RTC, so the guest boots with a stale clock that results in TLS
        # failures, confusing build timestamps, etc. Copy the host's clock in.
        ssh firecracker "/bin/date -u $(date -u +%Y%m%d%H%M.%S)" > /dev/null || true

    - name: Run user scripts
      shell: bash -e {0}
      env:
        PRE_RUN_SCRIPT: ${{ inputs.pre-run }}
        RUN_IN_VM_SCRIPT: ${{ inputs.run-in-vm }}
        POST_RUN_SCRIPT: ${{ inputs.post-run }}
      run: |
        firecracker_pid=$(cat /tmp/firecracker.pid)
        pre_run_script=$(mktemp)
        run_in_vm_script=$(mktemp)
        post_run_script=$(mktemp)
        printf '%s\n' "$PRE_RUN_SCRIPT" > $pre_run_script
        printf '%s\n' "$RUN_IN_VM_SCRIPT" > $run_in_vm_script
        printf '%s\n' "$POST_RUN_SCRIPT" > $post_run_script

        scp $run_in_vm_script firecracker:/tmp/.nbsd_fc_run_script

        sh -e $pre_run_script

        # NetBSD's non-interactive ssh shell does not have /sbin or
        # /usr/sbin in PATH; make user scripts see the full system PATH.
        guest_path="/sbin:/usr/sbin:/bin:/usr/bin:/usr/pkg/sbin:/usr/pkg/bin:/usr/local/sbin:/usr/local/bin"

        ssh firecracker 'mkfifo /tmp/.nbsd_fc_exit_code'
        set +e
        ssh firecracker "PATH=$guest_path sh -e /tmp/.nbsd_fc_run_script; echo \$? > /tmp/.nbsd_fc_exit_code" &
        ssh firecracker 'echo "Launched script and waiting for it to exit"; code=$(cat /tmp/.nbsd_fc_exit_code); echo "Script exited with code $code"; exit $code'
        script_exit_code=$?
        set -e

        if [ $script_exit_code -eq 0 ] || [ ${{ inputs.continue-on-error }} = true ]; then
          sh -e $post_run_script
        fi

        # Firecracker exits when the guest reboots; reboot(8) lives in /sbin,
        # which is not in the non-interactive PATH.
        ssh firecracker /sbin/reboot || true
        tail --pid=$firecracker_pid -f /dev/null || true

        exit $script_exit_code

    - name: Attach VM logs
      if: always()
      shell: bash -e {0}
      run: |
        echo "::group::ℹ️ Firecracker VM log (please link to this or attach the log contents when reporting a bug in this action)"
        cat /tmp/firecracker.log
        echo "::endgroup::"
